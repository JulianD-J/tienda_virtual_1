<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pago - PayCenter Futurista</title>
  <style>
    /* Estilos mínimos para la demo */
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#0b0f1a; color:#e6eef8; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .panel { background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); padding:24px; border-radius:12px; width:420px; box-shadow: 0 10px 30px rgba(2,6,23,0.7); }
    h1 { margin:0 0 8px 0; font-size:20px; color:#cfe7ff; }
    .items { margin:12px 0 18px 0; }
    .cart-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.03); }
    button { background:#6be3ff; color:#052433; border:0; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:600; }
    pre { background:rgba(255,255,255,0.02); padding:10px; border-radius:8px; overflow:auto; color:#d8f3ff; }
    .muted { color:#8faecb; font-size:13px; }
  </style>
</head>
<body>
  <div class="panel" role="main">
    <h1>Confirmar pago</h1>
    <div class="items" id="itemsList">
      <!-- Ejemplo de items en el checkout. Mantén/data-code si usas DOM para extraer códigos -->
      <div class="cart-item" data-code="PROD_A1">
        <span>Producto A</span>
        <span class="muted">PROD_A1</span>
      </div>
      <div class="cart-item" data-code="PROD_B2">
        <span>Producto B</span>
        <span class="muted">PROD_B2</span>
      </div>
    </div>

    <div style="display:flex; gap:10px; align-items:center;">
      <button id="payBtn">Pagar ahora</button>
      <div class="muted">Simulación: al pulsar se genera y muestra el recibo y se envía postMessage</div>
    </div>

    <h2 style="margin-top:18px; font-size:14px;">Recibo</h2>
    <pre id="receiptOutput" aria-live="polite">{ Esperando pago... }</pre>
  </div>

  <script>
    /**
     * Extrae códigos de producto a partir de:
     *  - receipt.items (si existe), mapeando code/productCode/sku
     *  - o elementos DOM .cart-item[data-code]
     */
    function extractProductCodes(receipt) {
      const codes = new Set();

      if (receipt && Array.isArray(receipt.items)) {
        receipt.items.forEach(item => {
          const c = item.code || item.productCode || item.sku || item.codigo;
          if (c) codes.add(String(c));
        });
      }

      // Intenta sacar códigos desde el DOM: elementos .cart-item[data-code]
      try {
        document.querySelectorAll('.cart-item[data-code]').forEach(el => {
          const c = el.getAttribute('data-code');
          if (c) codes.add(String(c));
        });
      } catch (e) {
        // ignore en entornos sin DOM
      }

      return Array.from(codes);
    }

    /**
     * Envía el receipt al parent/opener usando postMessage.
     * message: { type: 'receipt', completedCommand: string, productCodes: [] }
     * targetOrigin: especificar en producción (no '*') por seguridad
     */
    function postReceiptToParent(receipt, targetOrigin = '*') {
      const message = {
        type: 'receipt',
        completedCommand: receipt && (receipt.commandCompleted || receipt.command || receipt.id || '') || '',
        productCodes: extractProductCodes(receipt)
      };

      try {
        if (window.opener && !window.opener.closed) {
          // Checkout abierto en ventana nueva
          window.opener.postMessage(message, targetOrigin);
          console.log('[postReceipt] sent to window.opener', message);
        } else if (window.parent && window.parent !== window) {
          // Checkout embebido en iframe
          window.parent.postMessage(message, targetOrigin);
          console.log('[postReceipt] sent to window.parent', message);
        } else {
          // Fallback local (útil para testing)
          window.postMessage(message, targetOrigin);
          console.log('[postReceipt] posted to self', message);
        }
      } catch (err) {
        console.error('[postReceipt] fallo al enviar postMessage:', err, message);
      }

      return message;
    }

    /**
     * Muestra el recibo en pantalla (solo demo)
     */
    function showReceipt(receipt) {
      const el = document.getElementById('receiptOutput');
      try {
        el.textContent = JSON.stringify(receipt, null, 2);
      } catch (e) {
        el.textContent = String(receipt);
      }
    }

    /**
     * Handler de pago simulado: aquí debes integrar con tu flujo real.
     * - Genera/obtiene el objeto receipt tras completar el proceso backend/TPV.
     * - Llama a postReceiptToParent(receipt, '<TU_ORIGEN_PERMITIDO>')
     */
    async function completePaymentSimulation() {
      // Simular llamada a servidor y recibo
      const simulatedReceipt = {
        id: 'rec_2026_0001',
        commandCompleted: 'ORDER-2026-0001',
        timestamp: new Date().toISOString(),
        total: 59.90,
        currency: 'EUR',
        items: [
          { name: 'Producto A', code: 'PROD_A1', price: 29.95 },
          { name: 'Producto B', code: 'PROD_B2', price: 29.95 }
        ],
        paymentMethod: 'card'
      };

      // Mostrar el recibo en la UI
      showReceipt(simulatedReceipt);

      // Enviar el postMessage al parent/opener
      // IMPORTANTE: En producción sustituye '*' por el origen que esperas (ej. 'https://mi-app.com')
      postReceiptToParent(simulatedReceipt, '*');
    }

    // Vincular botón para demo
    document.getElementById('payBtn').addEventListener('click', () => {
      // Aquí podrías deshabilitar el botón y mostrar spinner mientras procesas el pago
      completePaymentSimulation();
    });

    // Ejemplo de listener local (solo para testing en la misma ventana)
    window.addEventListener('message', event => {
      // En producción verificar event.origin
      // if (event.origin !== 'https://mi-app-trustworthy.com') return;
      const data = event.data;
      if (!data || data.type !== 'receipt') return;
      console.log('[parent listener] recibo recibido:', data);
      // Aquí podrías cerrar popup, actualizar UI, enviar analytics, etc.
    });
  </script>
</body>
</html>
